[pytest]
testpaths = tests
python_files = test_*.py
; Cible long terme 80%. Plancher courant 35% (app.py/ocr.py/paths.py non couverts).
addopts = -q --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=35

[coverage:run]
source = .
omit =
    tests/*
    build/*
    dist/*
    vendor/*
    installer/*
    __pycache__/*
    anonymizer.spec
    setup_vendor.bat

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
